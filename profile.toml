[meta]
name = "cwilson (composed)"
description = "Dev workstation — composed from fragments"
compose = [
  "core/essentials",
  "platform/macos",
  "shell/bash",
  "role/dev",
]

# ─── Kitty ─────────────────────────────────────────────────────────────────
[kitty]
font = "IBM Plex Mono"
font_size = 13.0
theme = "alpharius"
window_padding = 8
scrollback_lines = 10000
macos_option_as_alt = true
macos_quit_when_last_window_closed = true

# ─── Shell (overrides on top of shell/bash fragment) ────────────────────────
[shell.aliases]
ls = "eza --icons --grid --group-directories-first"

[shell.env]
EDITOR = "nvim"
HISTTIMEFORMAT = "%F %T - "

# ─── Git ───────────────────────────────────────────────────────────────────
[git]
name = "Chris"
email = "72043878+cwilson613@users.noreply.github.com"
default_branch = "main"
pull_rebase = true
push_auto_setup_remote = true

# ─── Security ──────────────────────────────────────────────────────────────
[security]
touchid_sudo = true
